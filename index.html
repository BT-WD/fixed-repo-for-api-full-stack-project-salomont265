<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Brief — News Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">The Brief</div>
    <div class="nav-center">
      <input type="text" id="search-input" class="search-input" placeholder="Search headlines..." />
      <button id="search-btn" class="btn-search">Search</button>
    </div>
    <div class="nav-right">
      <button id="saved-btn" class="btn-saved">Saved Articles</button>
    </div>
  </nav>

  <div class="filter-bar">
    <button class="filter-chip active" data-guardian="news" data-gnews="breaking-news">Top Stories</button>
    <button class="filter-chip" data-guardian="technology" data-gnews="technology">Technology</button>
    <button class="filter-chip" data-guardian="science" data-gnews="science">Science</button>
    <button class="filter-chip" data-guardian="business" data-gnews="business">Business</button>
    <button class="filter-chip" data-guardian="sport" data-gnews="sports">Sports</button>
    <button class="filter-chip" data-guardian="health" data-gnews="health">Health</button>
    <button class="filter-chip" data-guardian="culture" data-gnews="entertainment">Entertainment</button>
  </div>

  <main>
    <div class="hero-card" id="hero-article"></div>
    <div class="section-label">Latest Stories</div>
    <div class="article-grid" id="article-grid"></div>
  </main>

  <div id="saved-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title">Saved Articles</h2>
        <button id="close-modal" class="btn-close">✕</button>
      </div>
      <div id="saved-articles-list" class="saved-articles-list">
        <p class="empty-state">Nothing saved yet.</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
